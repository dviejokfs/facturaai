services:
  rustfs:
    image: rustfs/rustfs:latest
    container_name: invoscanai-rustfs
    restart: unless-stopped
    environment:
      RUSTFS_ACCESS_KEY: facturaai
      RUSTFS_SECRET_KEY: facturaai-secret
      RUSTFS_VOLUMES: /data
      RUSTFS_CONSOLE_ENABLE: "true"
      RUSTFS_ADDRESS: ":9000"
      RUSTFS_CONSOLE_ADDRESS: ":9001"
    ports:
      - "19000:9000"   # S3 API
      - "19001:9001"   # Web console
    volumes:
      - invoscanai_rustfs:/datago

volumes:
  invoscanai_rustfs:
